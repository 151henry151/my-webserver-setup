server {
    listen 80;
    server_name ampache.romptele.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ampache.romptele.com;

    root /var/www/ampache/public;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/ampache.romptele.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ampache.romptele.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ampache_access.log;
    error_log /var/log/nginx/ampache_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~* \.(?:jpg|jpeg|gif|png|css|js|ico|xml)$ {
        expires 30d;
        access_log off;
    }

    client_max_body_size 100M;
} 