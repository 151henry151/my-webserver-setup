<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Calculator</title>
    <style>
        body { 
            font-family: 'Fira Mono', 'Consolas', 'Liberation Mono', 'Menlo', 'Monaco', 'Fixedsys', monospace; 
            background: #f9f9f9; 
            color: #222; 
            margin: 0; 
            padding: 2em; 
        }
        .container { 
            max-width: 800px; 
            margin: 2em auto; 
            background: #fff; 
            padding: 2em 2.5em; 
            border-radius: 12px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.07); 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 1.5em; 
            font-size: 2.2em; 
            letter-spacing: 0.04em; 
        }
        .calculator {
            margin: 2em 0;
            padding: 1em;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .input-group {
            margin: 1em 0;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0.8em 1.5em;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin: 1em 0;
        }
        button:hover {
            background: #357abd;
        }
        .result {
            margin-top: 1em;
            padding: 1em;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 1.1em;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 2em;
            color: #4a90e2;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solar System Calculator</h1>
        
        <div class="calculator">
            <h2>Solar System Scale Model Calculator</h2>
            <p>Enter the sun's diameter in inches to calculate the scaled planet diameters:</p>
            
            <div class="input-group">
                <label for="sunDiameter">Sun's Diameter (inches):</label>
                <input type="number" id="sunDiameter" min="0.1" step="0.1" value="36">
            </div>
            
            <button onclick="calculateScale()">Calculate</button>
            
            <div id="scaleResults" class="result"></div>
        </div>

        <div class="calculator">
            <h2>Distance Calculator</h2>
            <p>Calculate the distance between any two objects in the solar system.</p>
            
            <div class="input-group">
                <label for="object1">First Object:</label>
                <select id="object1">
                    <option value="Sun">Sun</option>
                    <option value="Mercury">Mercury</option>
                    <option value="Venus">Venus</option>
                    <option value="Earth" selected>Earth</option>
                    <option value="Mars">Mars</option>
                    <option value="Jupiter">Jupiter</option>
                    <option value="Saturn">Saturn</option>
                    <option value="Uranus">Uranus</option>
                    <option value="Neptune">Neptune</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="object2">Second Object:</label>
                <select id="object2">
                    <option value="Sun">Sun</option>
                    <option value="Mercury">Mercury</option>
                    <option value="Venus">Venus</option>
                    <option value="Earth">Earth</option>
                    <option value="Mars" selected>Mars</option>
                    <option value="Jupiter">Jupiter</option>
                    <option value="Saturn">Saturn</option>
                    <option value="Uranus">Uranus</option>
                    <option value="Neptune">Neptune</option>
                </select>
            </div>
            
            <button onclick="calculateDistance()">Calculate Distance</button>
            
            <div id="distanceResult" class="result"></div>
        </div>

        <a href="/" class="back-link">Back to Home</a>
    </div>

    <script>
        const planetData = {
            sun: { name: "Sun", diameter: 1392684000000 },
            mercury: { name: "Mercury", distance: 57.9, diameter: 4879 },
            venus: { name: "Venus", distance: 108.2, diameter: 12104 },
            earth: { name: "Earth", distance: 149.6, diameter: 12756 },
            mars: { name: "Mars", distance: 227.9, diameter: 6792 },
            jupiter: { name: "Jupiter", distance: 778.5, diameter: 142984 },
            saturn: { name: "Saturn", distance: 1427, diameter: 120536 },
            uranus: { name: "Uranus", distance: 2871, diameter: 51118 },
            neptune: { name: "Neptune", distance: 4495, diameter: 49528 }
        };

        function calculateScale() {
            const sunDiameterInches = parseFloat(document.getElementById('sunDiameter').value);
            if (isNaN(sunDiameterInches) || sunDiameterInches <= 0) {
                alert('Please enter a valid diameter for the sun');
                return;
            }

            // Calculate scale factor based on sun's diameter (real sun diameter in mm / model sun diameter in mm)
            const realSunDiameterMM = 1392684000000; // 1,392,684 km = 1,392,684,000,000 mm
            const modelSunDiameterMM = sunDiameterInches * 25.4;
            const scaleFactor = realSunDiameterMM / modelSunDiameterMM;

            let results = '<h3>Your Scale Model:</h3>';
            results += `<p><strong>Scale Factor:</strong> 1:${Math.round(scaleFactor).toLocaleString()}</p>`;
            results += '<h4>Planet Diameters:</h4>';
            
            for (const [key, planet] of Object.entries(planetData)) {
                if (key === 'sun') continue; // Skip sun as we already have its size
                // planet.diameter is in km, convert to mm
                const planetDiameterMM = planet.diameter * 1e6; // km to mm
                const scaledDiameter = (planetDiameterMM / scaleFactor) / 25.4; // Convert to inches
                results += `<p><strong>${planet.name}:</strong> ${scaledDiameter.toFixed(3)} inches</p>`;
            }

            results += '<h4>Distances from Sun:</h4>';
            for (const [key, planet] of Object.entries(planetData)) {
                if (key === 'sun') continue; // Skip sun
                // planet.distance is in millions of km, so *1e9 to get mm
                const planetDistanceMM = planet.distance * 1e9;
                const scaledDistance = planetDistanceMM / scaleFactor; // in mm
                const scaledDistanceFeet = (scaledDistance / 304.8); // mm to feet
                results += `<p><strong>${planet.name}:</strong> ${scaledDistanceFeet.toFixed(1)} feet</p>`;
            }

            document.getElementById('scaleResults').innerHTML = results;
        }

        function calculateDistance() {
            const planet1 = document.getElementById('object1').value;
            const planet2 = document.getElementById('object2').value;
            const sunDiameterInches = parseFloat(document.getElementById('sunDiameter').value);
            const scaleFactor = sunDiameterInches / planetData.sun.diameter;
            const distance1 = planetData[planet1].distance * scaleFactor;
            const distance2 = planetData[planet2].distance * scaleFactor;
            const distanceBetween = Math.abs(distance1 - distance2);
            document.getElementById('distanceResult').innerHTML = `<p>Distance between ${planet1} and ${planet2}: ${distanceBetween.toFixed(2)} inches</p>`;
        }
    </script>
</body>
</html>
