<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Calculator</title>
    <style>
        body { 
            font-family: 'Fira Mono', 'Consolas', 'Liberation Mono', 'Menlo', 'Monaco', 'Fixedsys', monospace; 
            background: #f9f9f9; 
            color: #222; 
            margin: 0; 
            padding: 2em; 
        }
        .container { 
            max-width: 800px; 
            margin: 2em auto; 
            background: #fff; 
            padding: 2em 2.5em; 
            border-radius: 12px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.07); 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 1.5em; 
            font-size: 2.2em; 
            letter-spacing: 0.04em; 
        }
        .calculator {
            margin: 2em 0;
            padding: 1em;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .input-group {
            margin: 1em 0;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0.8em 1.5em;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin: 1em 0;
        }
        button:hover {
            background: #357abd;
        }
        .result {
            margin-top: 1em;
            padding: 1em;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 1.1em;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 2em;
            color: #4a90e2;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solar System Calculator</h1>
        
        <div class="calculator">
            <h2>Scale Model Calculator</h2>
            <p>Enter a scale factor to calculate the scaled sizes and distances of the solar system objects.</p>
            
            <div class="input-group">
                <label for="scale">Scale Factor (1:X):</label>
                <input type="number" id="scale" min="1" value="1000000000">
            </div>
            
            <button onclick="calculateScale()">Calculate</button>
            
            <div id="scaleResults" class="result"></div>
        </div>

        <div class="calculator">
            <h2>Distance Calculator</h2>
            <p>Calculate the distance between any two planets in the solar system.</p>
            
            <div class="input-group">
                <label for="planet1">First Planet:</label>
                <select id="planet1" class="planet-select">
                    <option value="mercury">Mercury</option>
                    <option value="venus">Venus</option>
                    <option value="earth">Earth</option>
                    <option value="mars">Mars</option>
                    <option value="jupiter">Jupiter</option>
                    <option value="saturn">Saturn</option>
                    <option value="uranus">Uranus</option>
                    <option value="neptune">Neptune</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="planet2">Second Planet:</label>
                <select id="planet2" class="planet-select">
                    <option value="mercury">Mercury</option>
                    <option value="venus">Venus</option>
                    <option value="earth">Earth</option>
                    <option value="mars">Mars</option>
                    <option value="jupiter">Jupiter</option>
                    <option value="saturn">Saturn</option>
                    <option value="uranus">Uranus</option>
                    <option value="neptune">Neptune</option>
                </select>
            </div>
            
            <button onclick="calculateDistance()">Calculate Distance</button>
            
            <div id="distanceResults" class="result"></div>
        </div>

        <a href="/" class="back-link">Back to Home</a>
    </div>

    <script>
        const planetData = {
            mercury: { name: "Mercury", distance: 57.9, diameter: 4879 },
            venus: { name: "Venus", distance: 108.2, diameter: 12104 },
            earth: { name: "Earth", distance: 149.6, diameter: 12756 },
            mars: { name: "Mars", distance: 227.9, diameter: 6792 },
            jupiter: { name: "Jupiter", distance: 778.5, diameter: 142984 },
            saturn: { name: "Saturn", distance: 1427, diameter: 120536 },
            uranus: { name: "Uranus", distance: 2871, diameter: 51118 },
            neptune: { name: "Neptune", distance: 4495, diameter: 49528 }
        };

        function calculateScale() {
            const scale = parseFloat(document.getElementById('scale').value);
            if (isNaN(scale) || scale <= 0) {
                alert('Please enter a valid scale factor');
                return;
            }

            let results = '<h3>Scaled Sizes and Distances:</h3>';
            for (const [key, planet] of Object.entries(planetData)) {
                const scaledDistance = (planet.distance * 1000000) / scale;
                const scaledDiameter = planet.diameter / scale;
                results += `<p><strong>${planet.name}:</strong><br>`;
                results += `Distance from Sun: ${scaledDistance.toFixed(2)} meters<br>`;
                results += `Diameter: ${scaledDiameter.toFixed(2)} meters</p>`;
            }

            document.getElementById('scaleResults').innerHTML = results;
        }

        function calculateDistance() {
            const planet1 = document.getElementById('planet1').value;
            const planet2 = document.getElementById('planet2').value;

            if (planet1 === planet2) {
                document.getElementById('distanceResults').innerHTML = 
                    '<p>Please select two different planets.</p>';
                return;
            }

            const distance1 = planetData[planet1].distance;
            const distance2 = planetData[planet2].distance;
            const distance = Math.abs(distance1 - distance2);

            document.getElementById('distanceResults').innerHTML = 
                `<p>Distance between ${planetData[planet1].name} and ${planetData[planet2].name}:<br>` +
                `${distance.toFixed(1)} million kilometers</p>`;
        }
    </script>
</body>
</html>
